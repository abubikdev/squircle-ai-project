<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Squircle AI</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
	      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	        crossorigin="anonymous"></script>
	<link rel="stylesheet" href="style.css">
	<script src="script.js"></script>
</head>
<body class="bg-white">
<div class="contact-custom-color">
	<header class="py-4 px-5">
		<nav class="navbar navbar-expand-lg bg-black rounded-pill px-3">
			<div class="container-fluid justify-content-center justify-content-lg-between">
				<a class="navbar-brand d-flex align-items-center d-none d-lg-block" href="index.html">
					<img src="assets/images/logo.svg" alt="Logo" class="logo-size-nav">
				</a>

				<div class="justify-content-center">
					<ul class="navbar-nav flex-row gap-4 gap-sm-5 text-center flex-wrap justify-content-center align-items-center">
						<li class="nav-item">
							<a class="nav-link text-white space-font" href="index.html">
								Home
							</a>
						</li>

						<li class="nav-item">
							<a class="nav-link text-white space-font" href="features.html">
								Features
							</a>
						</li>
						<li class="nav-item">
							<a class="nav-link text-white space-font text-decoration-underline" href="contact.html">
								Contacts
							</a>
						</li>

						<li class="nav-item">
							<a class="nav-link text-white space-font" href="pricing.html">
								Pricing
							</a>
						</li>
					</ul>
				</div>

				<button class="btn btn-light rounded-pill px-4 py-2 d-none d-lg-block space-font">
					Try it out
				</button>
			</div>
		</nav>

		<section class="bigger-top-padding bigger-bottom-padding">
			<h1 class="display-1 text-center p-4">Contact Us</h1>
		</section>
	</header>
	<main class="py-4 px-5">
		<section class="mb-5">
			<div class="row">
				<div class="col-md-7">
					<h2 class="display-6">Via Message</h2>

					<form>
						<div class="col d-grid gap-0 row-gap-4">
							<div class="row">
								<div class="col-md-6">
									<label class="fs-4 w-100">First Name
										<input type="text"
										       class="bg-white rounded-pill form-control contact-border shadow-none ps-3"
										       placeholder="First Name">
									</label>
								</div>

								<div class="col-md-6">
									<label class="fs-4 w-100">Last Name
										<input type="text"
										       class="bg-white rounded-pill form-control contact-border shadow-none ps-3"
										       placeholder="Last Name">
									</label>
								</div>
							</div>

							<div class="row">
								<label class="fs-4">Email
									<input type="text"
									       class="bg-white rounded-pill form-control contact-border shadow-none ps-3"
									       placeholder="Email Address">
								</label>
							</div>

							<div class="row">
								<label class="fs-4">Message
									<textarea
											class="bg-white text-dark rounded-5 form-control contact-border shadow-none ps-3"
											placeholder="Message"></textarea>
								</label>
							</div>

							<div class="row px-3 justify-content-center d-flex mb-2">
								<button class="bg-brown-ish fs-4 text-light rounded-pill btn btn-light border border-0"
								        type="submit">Submit
								</button>
							</div>
						</div>
					</form>
				</div>
				<div class="col-md-5 d-flex align-items-center justify-content-center">
					<div class="ratio ratio-4x3 overflow-hidden rounded-5 contact-border shadow-none ps-3">
						<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2600.2021879215604!2d17.982633276952054!3d49.329390771399964!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x471383478d8533d1%3A0x517654d78b12052a!2sRokytnice%20458%2C%20755%2001%20Vset%C3%ADn%201-Rokytnice!5e0!3m2!1scs!2scz!4v1780038640237!5m2!1scs!2scz"
						        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
						        referrerpolicy="no-referrer-when-downgrade">
						</iframe>
					</div>
				</div>
			</div>
		</section>
		<section>
			<div class="row">
				<div class="col-md-7">
					<h2 class="display-6 pb-5">Call us</h2>
					<div class="d-grid gap-0 row-gap-5">
						<div class="row align-items-center">
							<div class="col-auto flex-shrink-0">
								<img class="phone-image" src="assets/images/phone.png" alt="Phone icon">
							</div>
							<div class="col">
								<p class="fs-6 mb-0">+420 676 676 420</p>
							</div>
						</div>

						<div class="row align-items-center">
							<div class="col-auto flex-shrink-0">
								<img class="mail-image" src="assets/images/mail.png" alt="Email icon">
							</div>
							<div class="col">
								<p class="fs-6 mb-0">SquircleHQ@gmail.com</p>
							</div>
						</div>

						<div class="row align-items-center">
							<div class="col-auto flex-shrink-0">
								<img class="pin-image" src="assets/images/pin.png" alt="Location icon">
							</div>

							<div class="col">
								<p class="fs-6 mb-0">Czechia</p>
							</div>
							<p class="fs-6 m-0">110 00 Prague 1 Nové Město</p>
						</div>

						<div class="row align-items-center">
							<div class="col-auto flex-shrink-0">
								<img class="pin-image" src="assets/images/pin.png" alt="Location icon">
							</div>

							<div class="col">
								<p class="fs-6 mb-0">USA</p>
							</div>
							<p class="fs-6 m-0">Albuquerque, New Mexico 87104</p>
						</div>
					</div>
				</div>

				<div class="col-md-5 d-flex align-items-center justify-content-center">
					<pica>
				</div>
			</div>
		</section>
	</main>
</div>
<div class="foot-divider m-5"></div>
<footer class="mx-5">
	<div class="col">
		<div class="pb-5 container-fluid justify-content-center justify-content-lg-between">
			<div class="justify-content-center">
				<ul class="navbar-nav flex-row gap-5 gap-sm-5 text-center flex-wrap justify-content-center align-items-center">
					<li class="nav-item">
						<a class="nav-link space-font" href="index.html">
							Home
						</a>
					</li>
					<li class="ps-2 d-none d-lg-block"></li>
					<li class="nav-item">
						<a class="nav-link space-font" href="features.html">
							Features
						</a>
					</li>
					<li class="ps-2 d-none d-lg-block"></li>
					<li class="nav-item d-none d-sm-block">
						<a class="navbar-brand d-flex align-items-center" href="index.html">
							<img src="assets/images/logo.svg" alt="Logo" class="logo-size-nav">
						</a>
					</li>
					<li class="ps-2 d-none d-lg-block"></li>
					<li class="nav-item">
						<a class="nav-link space-font text-decoration-underline" href="contact.html">
							Contacts
						</a>
					</li>
					<li class="ps-2 d-none d-lg-block"></li>
					<li class="nav-item">
						<a class="nav-link space-font" href="pricing.html">
							Pricing
						</a>
					</li>
				</ul>
			</div>
		</div>
		<div class="col text-center pb-3">
			<small>© 2026 Squircle AI</small>
		</div>
	</div>
</footer>
</body>
</html>
